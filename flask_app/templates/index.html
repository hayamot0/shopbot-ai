<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopBot — Customer Support</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f0e0c;
            --surface: #1a1916;
            --surface2: #222120;
            --border: #2e2c29;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --text: #f0ece4;
            --text-muted: #8a8680;
            --user-bg: #c9a84c;
            --user-text: #0f0e0c;
            --bot-bg: #1a1916;
            --bot-border: #2e2c29;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(201, 168, 76, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(201, 168, 76, 0.04) 0%, transparent 60%);
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 720px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            padding: 24px 0 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 8px;
            animation: fadeDown 0.6s ease both;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 4px;
        }

        .logo {
            width: 36px;
            height: 36px;
            background: var(--gold);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.02em;
        }

        .header h1 span {
            color: var(--gold);
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 300;
            margin-left: 48px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #4caf50;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }

        .messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .message {
            display: flex;
            flex-direction: column;
            animation: fadeUp 0.3s ease both;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.bot {
            align-items: flex-start;
        }

        .message-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
            padding: 0 4px;
        }

        .message.user .message-label {
            color: var(--gold);
        }

        .bubble {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.65;
            font-weight: 300;
        }

        .message.user .bubble {
            background: var(--gold);
            color: var(--user-text);
            border-radius: 16px 16px 4px 16px;
            font-weight: 400;
        }

        .message.bot .bubble {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 16px 16px 16px 4px;
        }

        .typing-indicator {
            display: none;
            align-items: flex-start;
            gap: 0;
            animation: fadeUp 0.3s ease both;
        }

        .typing-indicator.visible {
            display: flex;
            flex-direction: column;
        }

        .typing-bubble {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px 16px 16px 4px;
            padding: 14px 18px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typingDot 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingDot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        .welcome {
            text-align: center;
            padding: 32px 16px;
            animation: fadeUp 0.6s ease 0.2s both;
        }

        .welcome-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .welcome h2 {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--text);
            margin-bottom: 8px;
        }

        .welcome p {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 300;
            line-height: 1.6;
            max-width: 380px;
            margin: 0 auto 20px;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .suggestion {
            padding: 8px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
        }

        .suggestion:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(201, 168, 76, 0.06);
        }

        .input-area {
            padding: 16px 0 8px;
            border-top: 1px solid var(--border);
            animation: fadeUp 0.6s ease 0.3s both;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px 10px 10px 16px;
            transition: border-color 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--gold);
        }

        textarea {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 300;
            resize: none;
            line-height: 1.5;
            max-height: 120px;
            min-height: 24px;
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 36px;
            height: 36px;
            background: var(--gold);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: var(--gold-light);
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .send-btn svg {
            width: 16px;
            height: 16px;
            fill: var(--bg);
        }

        .footer-note {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 10px;
            font-weight: 300;
            letter-spacing: 0.02em;
        }

        .footer-note span {
            color: var(--gold);
            font-weight: 400;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <div class="logo">👗</div>
                <h1>Shop<span>Bot</span></h1>
            </div>
            <div class="status">
                <div class="status-dot"></div>
                AI Customer Support · Available 24/7
            </div>
        </div>

        <div class="messages" id="messages">
            <div class="welcome" id="welcome">
                <div class="welcome-icon">✨</div>
                <h2>How can I help you today?</h2>
                <p>Ask me about your orders, our return policy, shipping information, or anything about our collection.</p>
                <div class="suggestions">
                    <button class="suggestion" onclick="sendSuggestion(this)">What's your return policy?</button>
                    <button class="suggestion" onclick="sendSuggestion(this)">Track order #1</button>
                    <button class="suggestion" onclick="sendSuggestion(this)">Shipping information</button>
                    <button class="suggestion" onclick="sendSuggestion(this)">What sizes do you carry?</button>
                </div>
            </div>
        </div>

        <div class="typing-indicator" id="typing">
            <div class="message-label">ShopBot</div>
            <div class="typing-bubble">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea 
                    id="input" 
                    placeholder="Ask about orders, returns, shipping..." 
                    rows="1"
                    onkeydown="handleKey(event)"
                    oninput="autoResize(this)"
                ></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
            <div class="footer-note">Powered by <span>ShopBot AI</span> · Built with Gemini + RAG + MCP</div>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const typingEl = document.getElementById('typing');
        const welcomeEl = document.getElementById('welcome');

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function sendSuggestion(btn) {
            inputEl.value = btn.textContent;
            sendMessage();
        }

        function addMessage(text, role) {
            if (welcomeEl) welcomeEl.remove();

            const msg = document.createElement('div');
            msg.className = `message ${role}`;

            const label = document.createElement('div');
            label.className = 'message-label';
            label.textContent = role === 'user' ? 'You' : 'ShopBot';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;

            msg.appendChild(label);
            msg.appendChild(bubble);
            messagesEl.appendChild(msg);
            scrollToBottom();
        }

        function scrollToBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function setLoading(loading) {
            sendBtn.disabled = loading;
            typingEl.classList.toggle('visible', loading);
            if (loading) scrollToBottom();
        }

        async function sendMessage() {
            const message = inputEl.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            inputEl.value = '';
            inputEl.style.height = 'auto';
            setLoading(true);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();
                setLoading(false);

                if (data.response) {
                    addMessage(data.response, 'bot');
                } else if (data.error) {
                    addMessage('Sorry, something went wrong. Please try again.', 'bot');
                }
            } catch (err) {
                setLoading(false);
                addMessage('Connection error. Please check if the server is running.', 'bot');
            }
        }
    </script>
</body>
</html>
